Define APP_ROOT /var/www/tppkk-absensi
Define APP_HOST 192.0.2.10
Define APP_PORT 8088

Listen ${APP_PORT}

<VirtualHost *:${APP_PORT}>
    ServerName ${APP_HOST}
    DocumentRoot ${APP_ROOT}/frontend/dist
    DirectoryIndex index.html
    ProxyPreserveHost On

    ProxyPass /app ws://127.0.0.1:8080/app
    ProxyPassReverse /app ws://127.0.0.1:8080/app

    AliasMatch "^/(api|sanctum|broadcasting)(/.*)?$" "${APP_ROOT}/backend/public/index.php"
    Alias /storage/ ${APP_ROOT}/backend/public/storage/

    <Directory ${APP_ROOT}/frontend/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    <Directory ${APP_ROOT}/backend/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        <Files index.php>
            SetHandler "proxy:unix:/run/php/php8.3-fpm.sock|fcgi://localhost"
        </Files>
    </Directory>

    <Directory ${APP_ROOT}/backend/public/storage>
        Options -Indexes
        Require all granted
    </Directory>

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog ${APACHE_LOG_DIR}/tppkk-local-error.log
    CustomLog ${APACHE_LOG_DIR}/tppkk-local-access.log combined
</VirtualHost>
