Listen 8088

<VirtualHost *:8088>
    ServerName 20.20.20.2
    DocumentRoot /home/robert/tppkk-absensi/frontend/dist
    DirectoryIndex index.html
    ProxyPreserveHost On

    ProxyPass /app ws://127.0.0.1:8080/app
    ProxyPassReverse /app ws://127.0.0.1:8080/app

    AliasMatch "^/(api|sanctum|broadcasting)(/.*)?$" "/home/robert/tppkk-absensi/backend/public/index.php"
    Alias /storage/ /home/robert/tppkk-absensi/backend/public/storage/

    <Directory /home/robert/tppkk-absensi/frontend/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    <Directory /home/robert/tppkk-absensi/backend/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        <Files index.php>
            SetHandler "proxy:unix:/run/php/php8.3-fpm.sock|fcgi://localhost"
        </Files>
    </Directory>

    <Directory /home/robert/tppkk-absensi/backend/public/storage>
        Options -Indexes
        Require all granted
    </Directory>

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog ${APACHE_LOG_DIR}/tppkk-local-error.log
    CustomLog ${APACHE_LOG_DIR}/tppkk-local-access.log combined
</VirtualHost>
