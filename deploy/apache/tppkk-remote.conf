Listen 127.0.0.1:5173

<VirtualHost *:80 127.0.0.1:5173>
    ServerName absensi.kapul.my.id
    ServerAlias 20.20.20.21
    DocumentRoot /var/www/tppkk-absensi/frontend/dist
    DirectoryIndex index.html
    ProxyPreserveHost On

    ProxyPass /app ws://127.0.0.1:8080/app
    ProxyPassReverse /app ws://127.0.0.1:8080/app

    Alias /phpmyadmin /usr/share/phpmyadmin
    AliasMatch "^/(api|sanctum|broadcasting)(/.*)?$" "/var/www/tppkk-absensi/backend/public/index.php"
    Alias /storage/ /var/www/tppkk-absensi/backend/public/storage/

    <Directory /usr/share/phpmyadmin>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        DirectoryIndex index.php
        AuthType Basic
        AuthName "phpMyAdmin"
        AuthUserFile /etc/apache2/tppkk-phpmyadmin.htpasswd
        Require valid-user

        <FilesMatch "\.php$">
            SetHandler "proxy:unix:/run/php/phpmyadmin-fpm.sock|fcgi://localhost"
        </FilesMatch>
    </Directory>

    <Directory /usr/share/phpmyadmin/setup>
        Require all denied
    </Directory>

    <Directory /var/www/tppkk-absensi/frontend/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    <Directory /var/www/tppkk-absensi/backend/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        <Files index.php>
            SetHandler "proxy:unix:/run/php/php8.3-fpm.sock|fcgi://localhost"
        </Files>
    </Directory>

    <Directory /var/www/tppkk-absensi/backend/public/storage>
        Options -Indexes
        Require all granted
    </Directory>

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog ${APACHE_LOG_DIR}/tppkk-remote-error.log
    CustomLog ${APACHE_LOG_DIR}/tppkk-remote-access.log combined
</VirtualHost>
